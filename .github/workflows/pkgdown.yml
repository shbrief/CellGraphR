on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.42"

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::quarto, local::.
          needs: website

      - name: Build site (reference + home only; articles need local data)
        run: |
          pkg <- pkgdown::as_pkgdown(".")
          pkgdown::init_site(pkg)
          pkgdown::build_home(pkg)
          pkgdown::build_reference(pkg)
          pkgdown::build_search(pkg)
          pkgdown:::build_sitemap(pkg)
          pkgdown:::build_news(pkg, quiet = TRUE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
